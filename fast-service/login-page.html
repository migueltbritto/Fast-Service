<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login-page.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="icon" href="img/logo-fastservice-removebg-preview.png">

<body>

    <nav>
        <img src="img/logo-fastservice-removebg-preview.png" alt="Logo do site" class="logo">

        <ul class="menu">
            <li><a href="">Home</a></li>
            <li><a href="">COMO FUNCIONA</a></li>
            <li><a href="">CATEGORIAS</a></li>

        <div class="user-area">

            <div class="user-menu" id="userMenu">

    </header>

        </div>
